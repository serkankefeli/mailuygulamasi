<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kullanıcı Profili</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow">
  <div class="container">
    <a class="navbar-brand fw-bold" href="#"><i class="fa-solid fa-user-circle me-2"></i>Hesap Profili</a>
    <div class="d-flex align-items-center">
        <a href="{{ url_for('dashboard') }}" class="btn btn-secondary btn-sm"><i class="fa-solid fa-arrow-left me-1"></i> Ana Panele Dön</a>
    </div>
  </div>
</nav>

<div class="container">
    <div class="row justify-content-center">

        <div class="col-md-6">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <div class="card shadow-sm border-0 rounded-lg">
                <div class="card-body p-4">
                    <h5 class="fw-bold mb-4 text-primary"><i class="fa-solid fa-id-card me-2"></i>Kişisel Bilgileriniz</h5>

                    <form method="POST" action="/profile">

                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">Kayıtlı E-Posta Adresi (Değiştirilemez)</label>
                            <input type="email" class="form-control bg-light" value="{{ current_user.email }}" disabled>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold small">Ad Soyad / Şirket Adı</label>
                            <input type="text" name="ad_soyad" class="form-control" value="{{ current_user.ad_soyad }}" required>
                        </div>

                        <hr class="my-4">
                        <h6 class="fw-bold mb-3 text-secondary"><i class="fa-solid fa-lock me-2"></i>Güvenlik (İsteğe Bağlı)</h6>

                        <div class="mb-4">
                            <label class="form-label fw-bold small">Yeni Şifre Belirle (Değiştirmek istemiyorsanız boş bırakın)</label>
                            <input type="password" name="yeni_sifre" class="form-control" placeholder="Yeni şifreniz...">
                        </div>

                        <button type="submit" class="btn btn-primary w-100 fw-bold py-2"><i class="fa-solid fa-floppy-disk me-2"></i>Bilgileri Kaydet</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
