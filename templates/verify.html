<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2 Adımlı Doğrulama</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .code-input {
            font-size: 2rem;
            letter-spacing: 0.5rem;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow border-0 rounded-lg">
                <div class="card-body p-4 text-center">
                    <i class="fa-solid fa-mobile-screen-button fa-3x text-primary mb-3"></i>
                    <h4 class="fw-bold mb-2">Güvenlik Doğrulaması</h4>
                    <p class="text-muted small mb-4">E-posta adresinize gönderdiğimiz 6 haneli güvenlik kodunu giriniz.</p>

                    {% with messages = get_flashed_messages(with_categories=true) %}
                      {% if messages %}
                        {% for category, message in messages %}
                            <div class="alert alert-{{ category }}">{{ message }}</div>
                        {% endfor %}
                      {% endif %}
                    {% endwith %}

                    <form method="POST" action="/verify">
                        <div class="mb-4">
                            <input type="text" name="code" class="form-control code-input form-control-lg" maxlength="6" placeholder="000000" autocomplete="off" required autofocus>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-3 fw-bold fs-5">Kodu Doğrula ve Giriş Yap</button>
                    </form>

                    <div class="mt-4">
                        <a href="{{ url_for('login') }}" class="text-decoration-none small text-muted"><i class="fa-solid fa-arrow-left me-1"></i>Giriş Ekranına Dön</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
