<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Yönetimi Kapısı</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-dark d-flex align-items-center" style="height: 100vh;">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow-lg border-danger border-2 bg-dark text-white rounded-lg">
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <i class="fa-solid fa-shield-halved fa-3x text-danger mb-3"></i>
                        <h4 class="fw-bold text-uppercase tracking-widest">Sistem Yönetimi</h4>
                        <p class="text-secondary small">Sadece yetkili personel giriş yapabilir.</p>
                    </div>

                    {% with messages = get_flashed_messages(with_categories=true) %}
                      {% if messages %}
                        {% for category, message in messages %}
                            <div class="alert alert-{{ category }} bg-transparent border-{{ category }} text-{{ category }}">{{ message }}</div>
                        {% endfor %}
                      {% endif %}
                    {% endwith %}

                    <form method="POST" action="/gizli-kapi">
                        <div class="mb-3">
                            <label class="form-label fw-bold small text-secondary">E-Posta Adresi</label>
                            <input type="email" name="email" class="form-control bg-dark text-white border-secondary" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold small text-secondary">Anahtar Parola</label>
                            <input type="password" name="password" class="form-control bg-dark text-white border-secondary" required>
                        </div>
                        <button type="submit" class="btn btn-outline-danger w-100 py-2 fw-bold text-uppercase">Oturumu Aç</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
