<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sisteme Kayıt Ol</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow border-0 rounded-lg">
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <i class="fa-solid fa-user-plus fa-3x text-success mb-3"></i>
                        <h3 class="fw-bold">Yeni Hesap Oluştur</h3>
                        <p class="text-muted small">Hemen kayıt olun ve maillerinizi yönetmeye başlayın.</p>
                    </div>

                    {% with messages = get_flashed_messages(with_categories=true) %}
                      {% if messages %}
                        {% for category, message in messages %}
                            <div class="alert alert-{{ category }}">{{ message }}</div>
                        {% endfor %}
                      {% endif %}

                    {% endwith %}

                <form method="POST" action="/register">
                        <div class="mb-3">
                            <label class="form-label fw-bold small">Kullanıcı Adı</label>
                           <input type="text" name="ad_soyad" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold small text-primary"><i class="fa-solid fa-envelope me-1"></i>E-Posta Adresi (Zorunlu)</label>
                            <input type="email" name="email" class="form-control" placeholder="Dogrulama kodu buraya gelecek" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold small">Şifre</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold small">Şifre (Tekrar)</label>
                            <input type="password" name="confirm_password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100 py-2 fw-bold">Kayıt Ol</button>
                    </form>

                    <div class="text-center mt-3">
                        <span class="text-muted small">Zaten hesabınız var mı?</span>
                        <a href="{{ url_for('login') }}" class="text-decoration-none fw-bold">Giriş Yap</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
