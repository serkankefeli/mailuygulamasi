<header class="hero-section">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-lg-6 text-center text-lg-start mb-5 mb-lg-0 pr-lg-5">
                    <h1 class="display-4 fw-bold mb-4">{{ landing[1] }}</h1>
                    <p class="lead mb-5 opacity-75">{{ landing[2] }}</p>
                    <div class="d-flex flex-column flex-sm-row justify-content-center justify-content-lg-start gap-3">
                        <a href="{{ url_for('register') }}" class="btn btn-primary btn-lg px-5 py-3 fw-bold shadow"><i class="fas fa-rocket me-2"></i> Ücretsiz Başla</a>
                    </div>
                </div>

                <div class="col-lg-6">
                    <div class="position-relative shadow-lg rounded-4 overflow-hidden" style="border: 5px solid rgba(255,255,255,0.1);">

                        {% if landing[13] %}
                        <div class="ratio ratio-16x9 bg-dark">
                            <iframe src="{{ landing[13] }}" title="EST Mail Tanıtım" allowfullscreen></iframe>
                        </div>

                        {% elif landing[12] %}
                        <img src="{{ url_for('serve_uploads', filename=landing[12]) }}" class="img-fluid w-100" alt="EST Mail Arayüzü">

                        {% else %}
                        <div class="bg-dark text-center py-5 rounded">
                            <i class="fas fa-laptop-code fa-5x text-secondary mb-3 opacity-50 mt-4"></i>
                            <h5 class="text-secondary opacity-50 mb-4">Sisteminize ait bir ekran görüntüsü yükleyin</h5>
                        </div>
                        {% endif %}

                    </div>
                </div>
            </div>
        </div>
    </header>
