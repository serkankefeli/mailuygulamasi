<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sisteme Giriş</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">


<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h3 class="text-center mb-4">CRM Mailer</h3>

                    {% with messages = get_flashed_messages() %}
                      {% if messages %}
                        <div class="alert alert-danger">{{ messages[0] }}</div>
                      {% endif %}
                    {% endwith %}

                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">E-posta</label>
                            <input type="text" name="email" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Şifre</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Giriş Yap</button>
                    </form>
                        <div class="text-center mt-3">
                            <a href="{{ url_for('forgot_password') }}" class="text-decoration-none small text-muted">Şifremi Unuttum</a>
                        </div>
                    <div class="text-center mt-4">
                        <span class="text-muted small">Hesabınız yok mu?</span>
                        <a href="{{ url_for('register') }}" class="text-decoration-none fw-bold text-success">Ücretsiz Kayıt Ol</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
