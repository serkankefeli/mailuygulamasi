<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Şifreyi Yenile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card p-4 shadow">
                <h4 class="fw-bold mb-3 text-success">Yeni Şifre Belirle</h4>
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}{% for category, message in messages %}<div class="alert alert-{{ category }}">{{ message }}</div>{% endfor %}{% endif %}
                {% endwith %}
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label small fw-bold">E-Postanıza Gelen 6 Haneli Kod</label>
                        <input type="text" name="code" class="form-control text-center fs-4 letter-spacing" maxlength="6" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label small fw-bold">Yeni Şifreniz</label>
                        <input type="password" name="new_password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Şifremi Güncelle</button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
