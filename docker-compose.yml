version: '3.8'

# MailKamp - Production docker-compose
#
# NOT: Uygulama şu an SQLite kullanıyor (kod tabanı sqlite3 ile yazılmış).
# PostgreSQL servisi daha önce tanımlıydı ama kod onu kullanmıyordu ve sadece kafa karıştırıyordu.
# İleride PostgreSQL'e geçiş yapılırsa burası genişletilir.

services:
  web:
    build: .
    container_name: est_mail_app
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      # Sunucuda bunları .env'den de verebilirsin ama burada zorlamak daha güvenli.
      MAILKAMP_ENV: production
      TZ: Europe/Istanbul
      # Eğer domainin varsa maillerdeki tracking/unsubscribe linkleri için DOLDUR:
      # PUBLIC_BASE_URL: "https://mailkamp.senindomain.com"
    volumes:
      # 📌 KRİTİK: Veritabanı, loglar ve kullanıcı SMTP ayarları burada kalıcı tutuluyor.
      # Bu volume olmadan her docker-compose up --build veritabanını SİLER.
      - ./instance:/app/instance
      # Yüklenen logolar ve ek dosyalar
      - ./static/images:/app/static/images
      - ./uploads:/app/uploads
    networks:
      - est_network

networks:
  est_network:
    driver: bridge
